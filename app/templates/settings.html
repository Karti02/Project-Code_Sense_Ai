{% extends "base.html" %}
{% block title %}Settings - CodeSense AI{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}

<div class="panel">
  <div class="panel-title">Monitoring & Appearance</div>
  <form method="POST" action="{{ url_for('settings.update') }}">
    <div class="form-check form-switch mb-3">
      <input class="form-check-input" type="checkbox" name="screenshots_enabled" id="ss"
             {% if user.screenshots_enabled %}checked{% endif %}>
      <label class="form-check-label" for="ss">Enable automatic screenshots</label>
    </div>

    <div class="mb-3" style="max-width:320px;">
      <label class="form-label">Screenshot interval (seconds)</label>
      <input type="number" min="30" name="screenshot_interval" class="form-control"
             value="{{ user.screenshot_interval }}">
    </div>

    <div class="mb-3" style="max-width:320px;">
      <label class="form-label">Daily coding goal (minutes)</label>
      <input type="number" min="10" name="daily_goal_minutes" class="form-control"
             value="{{ user.daily_goal_minutes }}">
    </div>

    <div class="mb-4" style="max-width:320px;">
      <label class="form-label">Theme</label>
      <select name="theme" class="form-select">
        <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark mode</option>
        <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light mode</option>
      </select>
    </div>

    <button type="submit" class="btn btn-brand"><i class="fa-solid fa-floppy-disk"></i> Save settings</button>
  </form>
</div>

<div class="panel">
  <div class="panel-title">Data Management</div>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <a href="{{ url_for('settings.export_data') }}" class="btn btn-outline-brand">
      <i class="fa-solid fa-file-export"></i> Export data (JSON)
    </a>
  </div>

  <form method="POST" action="{{ url_for('settings.import_data') }}" enctype="multipart/form-data"
        class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <input type="file" name="import_file" accept="application/json" class="form-control" style="max-width:280px;">
    <button type="submit" class="btn btn-outline-brand"><i class="fa-solid fa-file-import"></i> Import data</button>
  </form>

  <form method="POST" action="{{ url_for('settings.reset_analytics') }}"
        onsubmit="return confirm('This will permanently delete all your tracked activity. Continue?');">
    <button type="submit" class="btn" style="background: var(--danger); color:#fff;">
      <i class="fa-solid fa-trash"></i> Reset all analytics
    </button>
  </form>
</div>

{% endblock %}
